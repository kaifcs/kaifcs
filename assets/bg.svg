<svg width="1200" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <radialGradient id="blobCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <pattern id="dotGrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="120" fill="url(#bgBase)"/>
  <rect width="1200" height="120" fill="url(#dotGrid)"/>

  <circle cx="120" cy="60" r="130" fill="url(#blobCyan)" filter="url(#softBlur)"/>
  <circle cx="600" cy="20" r="140" fill="url(#blobTeal)" filter="url(#softBlur)"/>
  <circle cx="1080" cy="90" r="150" fill="url(#blobViolet)" filter="url(#softBlur)"/>

  <line x1="0" y1="119" x2="1200" y2="119" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
</svg>
