<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <radialGradient id="gGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="gBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <linearGradient id="gPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="220" height="220" rx="28" fill="url(#gBg)"/>
  <circle cx="110" cy="110" r="95" fill="url(#gGlow)" filter="url(#gBlur)"/>
  <rect x="18" y="18" width="184" height="184" rx="24" fill="url(#gPanel)" stroke="#ffffff" stroke-opacity="0.14"/>

  <!-- abstract branch / commit graph mark -->
  <g stroke="#38bdf8" stroke-width="5" fill="none" stroke-linecap="round">
    <line x1="70" y1="60" x2="70" y2="160"/>
    <path d="M70,110 C70,90 150,90 150,70"/>
  </g>

  <circle cx="70" cy="60" r="12" fill="#0f2027" stroke="#22d3ee" stroke-width="5"/>
  <circle cx="70" cy="160" r="12" fill="#0f2027" stroke="#22d3ee" stroke-width="5"/>
  <circle cx="150" cy="70" r="12" fill="#0f2027" stroke="#8b5cf6" stroke-width="5"/>
  <circle cx="70" cy="110" r="7" fill="#38bdf8"/>
</svg>
